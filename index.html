<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The Last Signal — an incremental ASCII survival adventure.">
  <title>The Last Signal</title>
  <style>
    :root{color-scheme:dark;--bg:#07110d;--panel:#0b1b14;--line:#244d38;--text:#b7f7ce;--muted:#72a985;--accent:#71ffa6;--danger:#ff8f8f}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#123121 0,#07110d 44%);color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;min-height:100vh}.shell{width:min(980px,calc(100% - 28px));margin:24px auto 50px}header{display:flex;justify-content:space-between;gap:20px;align-items:end;border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:18px}h1{font-size:clamp(1.6rem,4vw,2.8rem);letter-spacing:.14em;margin:0}.sub{color:var(--muted);margin:.4rem 0 0}.status{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}.stat,.panel{background:rgba(11,27,20,.91);border:1px solid var(--line);border-radius:10px}.stat{padding:12px}.stat span{display:block;color:var(--muted);font-size:.78rem}.stat strong{font-size:1.18rem}.layout{display:grid;grid-template-columns:minmax(0,1.65fr) minmax(260px,.85fr);gap:14px}.panel{padding:16px}.screen{min-height:330px;white-space:pre-wrap;line-height:1.32;overflow-wrap:anywhere}.message{border-top:1px dashed var(--line);padding-top:13px;margin-top:13px;color:#e5ffed}.actions,.nav{display:flex;flex-wrap:wrap;gap:9px;margin-top:14px}button{font:inherit;color:var(--text);background:#10271b;border:1px solid var(--line);border-radius:7px;padding:10px 12px;cursor:pointer;text-align:left}button:hover:not(:disabled){border-color:var(--accent);background:#163822}button:disabled{opacity:.45;cursor:not-allowed}.primary{background:var(--accent);color:#04210f;border-color:var(--accent);font-weight:700}.shop{display:grid;gap:8px}.shop button{width:100%}.hint{color:var(--muted);font-size:.83rem;line-height:1.45}.danger{color:var(--danger)}footer{color:var(--muted);font-size:.75rem;text-align:center;margin-top:18px}@media(max-width:760px){header{align-items:start;flex-direction:column}.status{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}.screen{min-height:285px}}
  </style>
</head>
<body>
  <main class="shell">
    <header><div><h1>THE LAST SIGNAL</h1><p class="sub">An incremental ASCII survival transmission.</p></div><button id="reset">Erase save</button></header>
    <section class="status" aria-label="Status">
      <div class="stat"><span>Signal</span><strong id="signal">0</strong></div><div class="stat"><span>Signal rate</span><strong id="rate">1/s</strong></div><div class="stat"><span>Health</span><strong id="health">20/20</strong></div><div class="stat"><span>Weapon</span><strong id="damage">1</strong></div>
    </section>
    <section class="layout">
      <div class="panel"><div id="screen" class="screen" aria-live="polite"></div><div id="actions" class="actions"></div><nav class="nav"><button class="primary" data-place="shelter">Shelter</button><button data-place="ruins">Ruins</button><button id="tunnelNav" data-place="tunnels" hidden>Tunnels</button></nav></div>
      <aside class="panel"><h2>Workbench</h2><div class="shop"><button id="buyAntenna">Patchwork antenna — 25 signal</button><button id="buyBlade">Salvaged blade — 60 signal</button><button id="buyArmor">Composite vest — 100 signal</button><button id="buyMap">Underground map — 150 signal</button></div><h2>Receiver</h2><div class="actions"><button id="listen">Listen</button><button id="broadcast">Broadcast 1 signal</button></div><p id="receiverText" class="hint">Static washes across an abandoned emergency band.</p><p class="hint">Progress saves automatically in this browser.</p></aside>
    </section><footer>Built with plain HTML, CSS, JavaScript, and a questionable radio.</footer>
  </main>
  <script>
    (()=>{const key='the-last-signal-v1',defaults={signal:0,rate:1,hp:20,maxHp:20,damage:1,listens:0,broadcasts:0,antenna:false,blade:false,armor:false,map:false,place:'shelter',enemy:null,ruinWins:0,tunnelWins:0,message:'The receiver wakes with a low green pulse. Somewhere beyond the storm, a carrier wave repeats.'};let s={...defaults,...JSON.parse(localStorage.getItem(key)||'{}'),enemy:null};const $=id=>document.getElementById(id),screen=$('screen'),actions=$('actions');const art={shelter:String.raw`       .-------------------.
      /  FIELD SHELTER  7  \
     /_____________________\
       |  [==]     /\   |
       |   ||     /  \  |
       |___||____/____\__|
          /  \      |
     ~~~~ storm horizon ~~~~`,ruins:String.raw`        |\        /|
    ____| \______/ |____
   /   _     RUINS    _  \
  /___|_|___________|_|___\
       ||   //      ||
    ___||__//_______||___
   static moves between towers`,tunnels:String.raw`       __________________
   ___/                  \___
 _/    SERVICE TUNNEL 09     \_
|   [cable]       [cable]      |
|__________   ________________|
           \_/`,victory:String.raw`       .       *       .
          SIGNAL CLEAR
       *       /|\       *
              / | \
             /__|__\`};const enemies={ruins:[['Scout Drone','    .------.\n ---| 00 |---\n    \'----\'\n      /\\',8,2,14],['Wire Hound','   /\\___/\\\n  /  x   x  \\\n /_____^_____\\\n    /   \\',15,3,25],['Relay Warden','    [||||||]\n  --[  o o ]--\n    [  --  ]\n     /|  |\\',24,4,42]],tunnels:[['Maintenance Unit','     ______\n  __| [::] |__\n /  |______|  \\\n    /|    |\\',34,5,62],['Buried Engine','  .============.\n /  CORE: ACTIVE \\\n|  ((  O  O  ))  |\n \\_____||______/ ',58,7,140]]};function save(){localStorage.setItem(key,JSON.stringify({...s,enemy:null}))}function spend(n){if(s.signal<n){s.message=`You need ${n-Math.floor(s.signal)} more signal.`;render();return false}s.signal-=n;return true}function addButton(label,fn){const b=document.createElement('button');b.type='button';b.textContent=label;b.addEventListener('click',fn);actions.appendChild(b)}function fight(type){const list=enemies[type],i=Math.min(type==='ruins'?s.ruinWins:s.tunnelWins,list.length-1),e=list[i];s.enemy={name:e[0],art:e[1],hp:e[2],maxHp:e[2],damage:e[3],reward:e[4],type};s.place='fight';s.message=`${e[0]} locks onto your position.`;render()}function attack(){const e=s.enemy,dealt=s.damage+Math.floor(Math.random()*3);e.hp-=dealt;if(e.hp<=0){s.signal+=e.reward;e.type==='ruins'?s.ruinWins++:s.tunnelWins++;s.enemy=null;s.place='victory';s.message=`Target disabled. You recover ${e.reward} signal fragments.`;save();render();return}const blocked=s.armor&&Math.random()<.25,incoming=blocked?0:e.damage;s.hp-=incoming;s.message=blocked?`You deal ${dealt}. The vest absorbs the return strike.`:`You deal ${dealt} and take ${incoming}.`;if(s.hp<=0){s.hp=s.maxHp;s.signal=Math.max(0,s.signal-20);s.enemy=null;s.place='shelter';s.message='You wake beneath the shelter antenna. Some stored signal was lost.'}save();render()}function render(){$('signal').textContent=Math.floor(s.signal);$('rate').textContent=s.rate+'/s';$('health').textContent=s.hp+'/'+s.maxHp;$('damage').textContent=s.damage;$('tunnelNav').hidden=!s.map;for(const [id,owned,label] of [['buyAntenna',s.antenna,'Patchwork antenna'],['buyBlade',s.blade,'Salvaged blade'],['buyArmor',s.armor,'Composite vest'],['buyMap',s.map,'Underground map']])if(owned){$(id).disabled=true;$(id).textContent=label+' — installed'}actions.innerHTML='';if(s.place==='fight'&&s.enemy){screen.textContent=`${s.enemy.art}\n\n${s.enemy.name}\nIntegrity: ${Math.max(0,s.enemy.hp)}/${s.enemy.maxHp}\n\n${s.message}`;addButton('Strike',attack);addButton('Retreat',()=>{s.enemy=null;s.place='shelter';s.message='You retreat into the storm.';render()});return}let base=art[s.place]||art.shelter;if(s.place==='ruins'){addButton('Follow the moving static',()=>fight('ruins'));addButton('Scavenge',()=>{const n=5+Math.floor(Math.random()*11);s.signal+=n;s.message=`You recover ${n} signal fragments from a collapsed relay.`;save();render()})}else if(s.place==='tunnels'){addButton('Descend toward the pulse',()=>fight('tunnels'));addButton('Decode wall marks',()=>{if(s.broadcasts>=10){s.damage+=2;s.broadcasts=0;s.message='The marks resolve into a weapon calibration sequence. Damage +2.'}else s.message='The marks repeat: SEND TEN CALLS INTO THE DARK.';save();render()})}else if(s.place==='victory'){base=art.victory;addButton('Return to shelter',()=>{s.place='shelter';s.message='The receiver hums with newly recovered data.';render()});addButton('Keep exploring',()=>{s.place=s.map?'tunnels':'ruins';s.message='The horizon answers with another pulse.';render()})}screen.textContent=`${base}\n\n${s.message}`;save()}document.querySelectorAll('[data-place]').forEach(b=>b.addEventListener('click',()=>{if(s.place==='fight')return;s.place=b.dataset.place;s.message=s.place==='shelter'?'Rain taps against the receiver housing.':s.place==='ruins'?'Metal shapes shift beyond the broken towers.':'A slow pulse travels through the buried cables.';render()}));$('listen').addEventListener('click',()=>{s.listens++;const lines=['...three...seven...do not answer the lights...','A voice reads coordinates that do not exist.','For one second, someone is breathing on the channel.','The carrier wave contains a second carrier wave.'];$('receiverText').textContent=lines[Math.floor(Math.random()*lines.length)];if(s.listens===12){s.maxHp+=10;s.hp=s.maxHp;s.message='Repeated exposure teaches you the storm rhythm. Maximum health +10.'}save();render()});$('broadcast').addEventListener('click',()=>{if(!spend(1))return;s.broadcasts++;$('receiverText').textContent=['Your call disappears into static.','A faint tone answers from below ground.','Something repeats your call half a second late.'][Math.floor(Math.random()*3)];save();render()});$('buyAntenna').addEventListener('click',()=>{if(!spend(25))return;s.antenna=true;s.rate+=2;s.message='The antenna finds two additional fragments each second.';render()});$('buyBlade').addEventListener('click',()=>{if(!spend(60))return;s.blade=true;s.damage+=4;s.message='The salvaged blade holds an unnaturally clean edge.';render()});$('buyArmor').addEventListener('click',()=>{if(!spend(100))return;s.armor=true;s.maxHp+=15;s.hp=s.maxHp;s.message='The composite vest seals across your chest. Maximum health +15.';render()});$('buyMap').addEventListener('click',()=>{if(!spend(150))return;s.map=true;s.message='The map reveals tunnels beneath Relay District 09.';render()});$('reset').addEventListener('click',()=>{if(confirm('Erase all progress?')){localStorage.removeItem(key);s={...defaults};render()}});setInterval(()=>{s.signal+=s.rate;$('signal').textContent=Math.floor(s.signal);save()},1000);render()})();
  </script>
</body>
</html>
